name: Sync CTP data from Booked

# Pulls the lab-equipment catalog and usage stats from Booked
# (corelabs.abudhabi.nyu.edu, behind the NYU VPN) and commits
# workshops/01-slidev/equipment.json and stats.json so the deck shows live data.
# Runs on the SELF-HOSTED "MEG Workstation" runner because Booked is only
# reachable from the NYU network; GitHub-hosted runners cannot reach it. The
# commit to main then triggers the Pages deploy (deploy-pages.yml) to republish.
#
# Requires org-level secrets available to this repo:
#   BOOKED_API_ID, BOOKED_API_KEY  (Booked > Profile > API Access)
# BOOKED_API_URL is not secret, so it's set inline below.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: write

concurrency:
  group: sync-booked-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: [MEG Workstation]
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch equipment from Booked
        working-directory: workshops/01-slidev
        env:
          BOOKED_API_URL: https://corelabs.abudhabi.nyu.edu/Services
          BOOKED_API_ID: ${{ secrets.BOOKED_API_ID }}
          BOOKED_API_KEY: ${{ secrets.BOOKED_API_KEY }}
        run: node scripts/fetch-equipment.mjs

      - name: Fetch usage stats from Booked
        working-directory: workshops/01-slidev
        continue-on-error: true # stats need reservation (admin) scope; don't fail the run if absent
        env:
          BOOKED_API_URL: https://corelabs.abudhabi.nyu.edu/Services
          BOOKED_API_ID: ${{ secrets.BOOKED_API_ID }}
          BOOKED_API_KEY: ${{ secrets.BOOKED_API_KEY }}
          STATS_MONTHS: "12"
        run: node scripts/fetch-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workshops/01-slidev/equipment.json workshops/01-slidev/stats.json
          $staged = git status --porcelain workshops/01-slidev/equipment.json workshops/01-slidev/stats.json
          if ($staged) {
            git commit -m "chore: sync CTP equipment + usage stats from Booked"
            git push
            Write-Host "Committed updated data"
          } else {
            Write-Host "No data changes"
          }
