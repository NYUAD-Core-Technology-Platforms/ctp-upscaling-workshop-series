name: Release workshop archives

# Cut a versioned archive of every workshop when you push a tag like v2026.05.
# Attaches, per workshop, to the GitHub Release:
#   <NN-slug>.pdf        the exported PDF
#   <NN-slug>-html.zip   an offline-openable copy of the interactive slides
#
# Usage:
#   git tag v2026.05 && git push origin v2026.05

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctp-upscaling-workshop-series
    steps:
      # Same sibling layout as the Pages workflow: the theme lives in
      # ctp-templates and is linked relatively from each workshop.
      - name: Checkout workshop series
        uses: actions/checkout@v4
        with:
          path: ctp-upscaling-workshop-series

      - name: Checkout theme repo (ctp-templates)
        uses: actions/checkout@v4
        with:
          repository: NYUAD-Core-Technology-Platforms/ctp-templates
          ref: main
          path: ctp-templates
          # If ctp-templates is PRIVATE, add a PAT secret and uncomment:
          # token: ${{ secrets.TEMPLATES_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ctp-upscaling-workshop-series/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium (for PDF export)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build release artifacts
        run: node scripts/ci-build.mjs --mode release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ctp-upscaling-workshop-series/release/*.pdf
            ctp-upscaling-workshop-series/release/*-html.zip
          generate_release_notes: true
